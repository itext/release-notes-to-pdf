              transform="translate(-600, -870)">
            iText ಗೆ 25ನೇ ವಾರ್ಷಿಕೋತ್ಸವದ ಶುಭಾಶಯಗಳು!
        </text>
        <text text-anchor="middle" style="fill: rgb(191, 94, 10);  font-size: 75px"
              transform="translate(-500, 885)" font-family="NotoSansMalayalam">
            iText-ന് 25-ാം വാർഷികം ആശംസകൾ!
        </text>
        <text text-anchor="middle" style="fill: rgb(2, 48, 89);  font-size: 45px"
              transform="translate(-180, -480)">
            iText အတွက် 25 နှစ်ပြည့်နေ့ကို ဂုဏ်ပြုပါသည်!
        </text>
        <text text-anchor="middle" style="fill: rgb(63, 126, 166);  font-size: 75px"
              transform="translate(850, -150)">
            iText ପାଇଁ 25ତମ ବର୍ଷଗାଠିର ଶୁଭେଚ୍ଛା!
        </text>
