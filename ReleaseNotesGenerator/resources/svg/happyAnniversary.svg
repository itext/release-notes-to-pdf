<svg role="img" aria-description="HappyAnniversary to iText" xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%" viewBox="-5 -5 970 690" preserveAspectRatio="xMidYMid meet">
    <style type="text/css">
        @font-face {
          font-family: 'NotoSansMalayalam';
          font-weight: 400;
          font-style: regular;
          src: url('../fonts/NotoSansMalayalam-Regular.ttf')
          format('TrueType');
        }
        .cls-1 {
          fill: url(#linear-gradient-2);
        }
        .cls-1, .cls-2, .cls-3, .cls-4 {
          fill-rule: evenodd;
        }
        .cls-2 {
          fill: url(#linear-gradient-3);
        }
        .cls-3 {
          fill: url(#linear-gradient-4);
        }
        .cls-5 {
          fill: #758592;
        }
        .cls-4 {
          fill: url(#linear-gradient);
        }
    </style>
    <defs>
        <clipPath id="textClip">
            <text transform="translate(220, 30) scale(0.3326,0.3326)" text-anchor="middle"
                  style="fill: rgb(2, 48, 89);  font-size: 60px">
                Apsveicam iText ar 25. jubileju!
            </text>
        </clipPath>

        <linearGradient id="template">
            <stop offset="0" stop-color="rgb(2, 48, 89)" stop-opacity="1"/>
            <stop offset="0.3" stop-color="rgb(191, 94, 10)" stop-opacity="0.5"/>
            <stop offset="1" stop-color="rgb(63, 126, 166)" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="gradient" href="#template"/>

        <linearGradient id="linear-gradient" x1="0" y1="116.735" x2="174.337" y2="116.735"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#042d4c"/>
            <stop offset="1" stop-color="#004167"/>
        </linearGradient>
        <linearGradient id="linear-gradient-2" x1="0" y1="116.735" x2="174.337" y2="116.735"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#013557"/>
            <stop offset="1" stop-color="#004167"/>
        </linearGradient>
        <linearGradient id="linear-gradient-3" x1="62.836" y1="222.906" x2="350.455" y2="222.911"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fe9032"/>
            <stop offset="1" stop-color="#f57f34"/>
        </linearGradient>
        <linearGradient id="linear-gradient-4" x1="61.36" y1="229.921" x2="351.004" y2="229.926"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fe9032"/>
            <stop offset="1" stop-color="#fe9032"/>
        </linearGradient>
    </defs>

    <g clip-path="url(#textClip)" fill-opacity="1">
        <rect x="0" y="0" width="400" height="140" fill="url(#linear-gradient)"/>
    </g>

