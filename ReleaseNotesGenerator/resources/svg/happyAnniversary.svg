        </text>
        <text text-anchor="middle" style="fill: #0c66e4;  font-size: 50px"
              transform="translate(-1000, -420)">
            iText'in 25. yıl dönümünü kutlarız!
        </text>
        <text text-anchor="middle" style="fill: rgb(217, 158, 50);  font-size: 60px"
              transform="translate(1000, -850)">
            iText को 25वीं वर्षगांठ की शुभकामनाएँ!
        </text>
        <text text-anchor="middle" style="fill: rgb(191, 94, 10);  font-size: 60px"
              transform="translate(-1000, 590)">
            יום הולדת 25 שמח ל-iText!
        </text>
        <text style="fill: rgb(63, 126, 166);  font-size: 50px" transform="translate(320, 835)">
            Sugeng tanggap warsa kaping 25 kanggo iText!
        </text>
        <text text-anchor="middle" style="fill: #0c66e4;  font-size: 50px"
              transform="translate(900, -400)">
            iTextning 25 yillik yubileyi bilan tabriklaymiz!
        </text>
        <text text-anchor="middle"
