                iText-কে ২৫তম বার্ষিকীর শুভেচ্ছা!
            </tspan>
            <tspan x="1200" y="730" text-anchor="end" style="fill: rgb(217, 158, 50);  font-size: 63px">
                iText కు 25వ వార్షికోత్సవ శుభాకాంక్షలు!
            </tspan>
        </text>
        <text text-anchor="end" style="fill: rgb(191, 94, 10);  font-size: 54px"
              transform="translate(1150, -730)">
            iTextને 25મી વર્ષગાંઠની શુભકામનાઓ!
            <tspan fill="url(#gradient)" style="font-size: 65px" dx="-2500" dy="760">
                عيد ميلاد سعيد الخامس والعشرون لـ iText!
            </tspan>
        </text>
        <text text-anchor="middle" fill="rgb(63, 126, 166)" font-size="70px"
              stroke="#004068" stroke-width="5" stroke-opacity="0.3" transform="translate(-100, -950)"
