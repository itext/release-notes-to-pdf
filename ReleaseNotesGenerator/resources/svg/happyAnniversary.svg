              transform="translate(25, -800)">
            iTextның 25 еллык юбилее белән котлыйбыз!
        </text>
        <text text-anchor="end" style="fill: rgb(191, 94, 10);  font-size: 55px" transform="translate(-330, -200)">
            Selamat ulang tahun ke-25 untuk iText!
        </text>
        <text text-anchor="middle" style="fill: rgb(2, 48, 89);  font-size: 65px"
              transform="translate(-900, -80)">
            iText ਨੂੰ 25ਵੇਂ ਸਾਲਗਿਰਹ ਦੀਆਂ ਵਧਾਈਆਂ!
        </text>
        <text text-anchor="middle"
              style="fill: rgb(217, 158, 50);  font-size: 50px"
              transform="translate(-1000, -520)">សូមអបអរសាទរ​ឆ្នាំទី 25 សម្រាប់ iText!
        </text>
        <text text-anchor="middle" style="fill: rgb(63, 126, 166);  font-size: 50px"
