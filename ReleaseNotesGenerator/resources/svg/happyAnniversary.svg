    <rect class="scaledRect" x="0" y="0" rx="500" ry="5" width="9600" height="68" transform="scale(0.1, 10)" fill="none"
          stroke="#0c66e4" stroke-width="5pt" vector-effect="non-scaling-stroke"/>
    <g transform="translate(470, 355) scale(0.3326,0.3326)">
        <text x="172" y="490" text-anchor="middle" fill="#0c66e4" font-size="6rem"
              stroke="url(#gradient)" stroke-width="1.5" stroke-opacity="0.5">
            iTextக்கு 25வது ஆண்டு விழாவிற்கு வாழ்த்துகள்!
            <tspan x="-1200" y="-723" text-anchor="start" stroke="rgb(191, 94, 10)" stroke-width="3"
                   fill="none" font-size="91px">
                Šťastné 25. výročí iTextu!
            </tspan>
            <tspan style="fill: rgb(191, 94, 10); font-size: 80px" text-anchor="start" x="-1300" dy="970">
                iText के 25वें वर्षगांठ की शुभकामनाएँ!
                <tspan style="fill: rgb(2, 48, 89)" font-size="75px" dx="-50" dy="-790" stroke="none">
                    Gefeliciteerd met de 25e verjaardag van iText!
                </tspan>
            </tspan>
        </text>
        <text x="90" y="-320" text-anchor="middle" fill="rgb(63, 126, 166)" font-size="5.5em">
            Happy 25th Anniversary to iText!
