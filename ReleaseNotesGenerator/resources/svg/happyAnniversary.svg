                С 25-летием, iText!
            </tspan>
        </text>
        <text text-anchor="middle" style="fill: rgb(217, 158, 50);  font-size: 60px" transform="translate(-800, 730)">
            iText-тің 25 жылдығымен құттықтаймыз!
            <tspan x="2100" y="-410" text-anchor="start" direction="rtl"
                   style="fill: rgb(191, 94, 10);  font-size: 70px">
                iText کے 25ویں سالگرہ کی مبارکباد!
                <tspan fill="rgb(2, 48, 89)" font-size="60px" dx="-1750" dy="30">
                    Feliz 25º aniversário iText!
                </tspan>
            </tspan>
        </text>
        <text text-anchor="middle" style="fill: rgb(63, 126, 166);  font-size: 60px"
              transform="translate(-800, -620)" text-decoration="underline">
            Joyeux 25e anniversaire à iText !
        </text>
        <text text-anchor="middle" text-decoration="underline"
              style="fill: #0c66e4;  font-size: 85px"
              transform="translate(390, 610)">
            Herzlichen Glückwunsch zum 25. Jubiläum, iText!
            <tspan style="fill: #0c66e4;  font-size: 55px" dx="-900" dy="-440">
                iText-in 25 illik yubileyi mübarək!
            </tspan>
        </text>
        <text text-anchor="middle"
              style="fill: rgb(217, 158, 50);  font-size: 65px"
              transform="translate(850, -50)">
            Buon 25° anniversario a iText!
        </text>
        <text x="-800" y="120" text-anchor="middle" style="fill: rgb(217, 158, 50);  font-size: 50px">
            Feliz 25º aniversário para iText!
        </text>
        <text x="1250" y="70" text-anchor="end" fill="rgb(2, 48, 89)" font-size="80px">
